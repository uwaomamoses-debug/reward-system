<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reward System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Stay Disciplined. Earn Rewards.</h1>
    <p>Track your tasks, stay consistent, and unlock rewards for your effort.</p>
    <a href="#tasks"><button>Start Now</button></a>
  </div>
    <div id="tasks" style="margin-top: 80px; text-align: center;">
   <h2>Tasks</h2>
   <input placeholder="Enter task" style="padding:10px; margin:5px;">
   <button>Add Task</button>

   <h2 style="margin-top: 30px;">Rewards</h2>
  <input placeholder="Enter reward" style="padding:10px; margin:5px;">
    <button>Add Reward</button>
 </div>
</body>
</html>
