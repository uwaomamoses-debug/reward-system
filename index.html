<h1>Task Reward System</h1>
<p class="subtitle">Complete every task. Unlock your rewards.</p>
<div class="progress-bar">
  <div id="progress"></div>
</div>
<div id="successMessage">🎉 All tasks completed. Rewards unlocked.</div>
<div class="container">

  <div class="box">
    <h2>Tasks</h2>
    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
  </div>

  <div class="box">
    <h2>Rewards</h2>
    <input id="rewardInput" placeholder="Enter reward">
    <button onclick="addReward()">Add Reward</button>
    <ul id="rewardList"></ul>
  </div>

</div>
