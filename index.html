<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reward System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .container, #tasks {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      font-weight: bold;
      margin: 5px;
    }

    button:hover {
      background: #16a34a;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <!-- LANDING PAGE -->
  <div class="container" id="landing">
    <h1>Stay Disciplined. Earn Rewards.</h1>
    <p>Track your tasks, stay consistent, and unlock rewards for your effort.</p>
    <button onclick="showTasks()">Start Now</button>
  </div>

  <!-- TASK PAGE -->
  <div id="tasks" style="display:none;">
    <h2>Tasks</h2>
    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>

    <h2 style="margin-top:30px;">Rewards</h2>
    <input id="rewardInput" placeholder="Enter reward">
    <button onclick="addReward()">Add Reward</button>
    <ul id="rewardList"></ul>
  </div>

  <script>
    function showTasks() {
      document.getElementById("landing").style.display = "none";
      document.getElementById("tasks").style.display = "block";
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      if (input.value === "") return;

      const li = document.createElement("li");
      li.textContent = input.value;
      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }

    function addReward() {
      const input = document.getElementById("rewardInput");
      if (input.value === "") return;

      const li = document.createElement("li");
      li.textContent = input.value;
      document.getElementById("rewardList").appendChild(li);

      input.value = "";
    }
  </script>

</body>
</html>
